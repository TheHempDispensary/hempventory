app = "thd-inventory-api"
primary_region = "sjc"

[build]

[env]
  DB_PATH = "/data/app.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.checks]
    [http_service.checks.healthz]
      interval = "30s"
      timeout = "10s"
      grace_period = "60s"
      method = "GET"
      path = "/healthz"

[mounts]
  source = "app_data"
  destination = "/data"

[[vm]]
  size = "performance-2x"
  memory = "4096mb"
