app = "thd-inventory-api"
primary_region = "sjc"

[build]

[env]
  DB_PATH = "/data/app.db"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1
  concurrency_type = "requests"
  concurrency_soft_limit = 200
  concurrency_hard_limit = 250

[[http_service.checks]]
  grace_period = "30s"
  interval = "15s"
  method = "GET"
  timeout = "10s"
  path = "/healthz"

[mounts]
  source = "app_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "2048mb"
